name: Tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e .
      - run: python -m unittest discover -v
      - run: python -m compileall -q src tests

  package-smoke:
    needs: unit-tests
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e . pyinstaller pillow
      - run: python scripts/create_icon.py
      - run: python -m PyInstaller packaging/typozap.spec --clean --noconfirm
      - uses: actions/upload-artifact@v4
        with:
          name: typozap-${{ runner.os }}-unsigned
          path: |
            dist/TypoZap.exe
            dist/TypoZap.app
